# Local development — same Lambda image that runs in AWS
# (public.ecr.aws/lambda/python:3.13), exercised locally via the built-in
# Lambda Runtime Interface Emulator (RIE).
#
# Three services, one image:
#   api     — API Lambda on RIE port 9000
#   worker  — Worker Lambda on RIE port 9001 (CMD override)
#   cli     — evaluator CLI for sync / local-run (entrypoint override + bind mounts)
#
# Build:          docker compose build
# API (up):       docker compose up api
#   invoke:       curl -sX POST http://localhost:9000/2015-03-31/functions/function/invocations \
#                   -H 'Content-Type: application/json' \
#                   -d '{"version":"2.0","routeKey":"GET /v1/health","rawPath":"/v1/health","headers":{},"requestContext":{"http":{"method":"GET","path":"/v1/health"}},"isBase64Encoded":false}'
# Worker invoke:  docker compose run --rm worker
# CLI:            docker compose run --rm cli python -m evaluator.sync survey

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: snaplogic-exercise-evaluator:latest
    ports:
      - "9000:8080"
    env_file:
      - .env
    # Default CMD from Dockerfile: backend.src.api.handler
    # No EVALUATOR_* overrides: the api only reads the image's baked-in
    # exercises, and the code defaults already resolve there.

  worker:
    image: snaplogic-exercise-evaluator:latest
    ports:
      - "9001:8080"
    env_file:
      - .env
    command: ["backend.src.worker.handler"]
    environment:
      # Mirror the cloud worker's env (infra/modules/sqs-worker): the image
      # sets no EVALUATOR_* vars, and the worker needs writable merge dirs.
      EVALUATOR_EXERCISES_DIR: /tmp/evaluator/exercises
      EVALUATOR_TMP_DIR: /tmp/evaluator/scratch
      EVALUATOR_GRADES_DIR: /tmp/evaluator/grades
      EVALUATOR_DISABLE_UI_REBUILD: "1"

  cli:
    image: snaplogic-exercise-evaluator:latest
    entrypoint: ["python"]
    command: ["-m", "evaluator", "--help"]
    env_file:
      - .env
    environment:
      # Pin the dirs to the bind mounts below so sync/grade writes land on
      # the host repo (these match the code defaults; kept explicit).
      EVALUATOR_EXERCISES_DIR: /var/task/exercises
      EVALUATOR_TMP_DIR: /var/task/.tmp
      EVALUATOR_GRADES_DIR: /var/task/grades
      # Keep the UI rebuild enabled so `evaluator.ui` can render dashboards.
      EVALUATOR_DISABLE_UI_REBUILD: ""
    volumes:
      - ./exercises:/var/task/exercises   # sync writes solution.json / expected/
      - ./grades:/var/task/grades         # persistent per-student reports
      - ./frontend/dist:/var/task/frontend/dist  # generated dashboard
      - ./.tmp:/var/task/.tmp             # scratch / local-run handoff bundle
