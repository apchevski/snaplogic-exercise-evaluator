# Local workflow for the deterministic evaluator.
#
# This is a CLI tool, not a server — you invoke one command per run with
# `docker compose run --rm evaluator <command>`. The bind mounts make the
# container operate directly on your checked-out repo: /prep writes solution
# caches back to exercises/, /grade plan writes scratch to .tmp/, and the
# report/UI steps write to grades/ + ui/ — exactly like the non-Docker flow.
#
# The .tmp/ and grades/ mounts are what let the deterministic steps (this
# container) hand off to the AI step (Claude Code on your host): `grade plan`
# writes .tmp/grades/<student>/<task>/ai_context.json here, Claude reads it on
# the host and writes evaluation.json back, then `grade report` reads those.
#
# Examples:
#   docker compose run --rm evaluator python -m evaluator.prep survey
#   docker compose run --rm evaluator python -m evaluator.prep sync --slug task_02_calculator
#   docker compose run --rm evaluator python -m evaluator.grade plan "Gabriela Shurbeska"
#   docker compose run --rm evaluator python -m evaluator.grade report "Gabriela Shurbeska"
#   docker compose run --rm evaluator python -m evaluator.ui --no-open

services:
  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    image: snaplogic-exercise-evaluator:latest
    # SnapLogic credentials are injected as real env vars (config.py reads
    # os.environ); the .env file itself is never copied into the image.
    env_file:
      - .env
    volumes:
      - ./exercises:/app/exercises   # prep writes solution.json / task.json / expected/
      - ./grades:/app/grades         # persistent per-student report.md + report.json
      - ./ui:/app/ui                 # generated dashboard (ui/index.html)
      - ./.tmp:/app/.tmp             # scratch + the AI-step handoff bundle
    # On native Linux, bind-mounted files are owned by your host user, so the
    # image's uid 10001 may be denied writes. Uncomment to run as yourself:
    # user: "${UID:-10001}:${GID:-10001}"
    command: ["python", "-m", "evaluator", "--help"]
