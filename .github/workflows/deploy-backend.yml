# Backend deploy: rebuild the Lambda image when anything baked into it
# changes, push to ECR, repoint both Lambdas. Authored exercise edits ship
# here automatically; an admin clicks Prep afterwards to refresh the
# generated artifacts in S3.
name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "evaluator/**"
      - "backend/**"
      - "exercises/**"
      - "schemas/**"
      - "requirements.txt"
      - "Dockerfile.lambda"
      - "Dockerfile.lambda.dockerignore"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC — no stored AWS keys
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} # e.g. snaplogic-evaluator-lambda
  API_FUNCTION: ${{ vars.API_FUNCTION }} # e.g. snaplogic-evaluator-api
  WORKER_FUNCTION: ${{ vars.WORKER_FUNCTION }} # e.g. snaplogic-evaluator-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -f Dockerfile.lambda -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Update both Lambdas
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          aws lambda update-function-code --function-name "$API_FUNCTION" --image-uri "$IMAGE"
          aws lambda update-function-code --function-name "$WORKER_FUNCTION" --image-uri "$IMAGE"
          aws lambda wait function-updated --function-name "$API_FUNCTION"
          aws lambda wait function-updated --function-name "$WORKER_FUNCTION"
