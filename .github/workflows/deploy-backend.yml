name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "evaluator/**"
      - "backend/**"
      - "exercises/**"
      - "schemas/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC — no stored AWS keys
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .github/deploy.vars >> "$GITHUB_ENV"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -f Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Update both Lambdas
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          aws lambda update-function-code --function-name "$API_FUNCTION" --image-uri "$IMAGE"
          aws lambda update-function-code --function-name "$WORKER_FUNCTION" --image-uri "$IMAGE"
          aws lambda wait function-updated --function-name "$API_FUNCTION"
          aws lambda wait function-updated --function-name "$WORKER_FUNCTION"
