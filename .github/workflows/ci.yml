# CI — $0 by construction: Claude is a stub client, AWS is moto, SnapLogic
# is never touched. Runs on every push/PR.
name: ci

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check evaluator backend
      - run: pytest backend/tests -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.1"
      - run: terraform fmt -check -recursive infra
      - run: terraform -chdir=infra/envs/prod init -backend=false -input=false
      - run: terraform -chdir=infra/envs/prod validate
      - run: terraform -chdir=infra/bootstrap init -backend=false -input=false
      - run: terraform -chdir=infra/bootstrap validate
