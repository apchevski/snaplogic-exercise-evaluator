# Frontend: test → build → deploy. `test` (vitest) and `build` (tsc type-check +
# vite bundle) both run on every PR/push and are the pre-merge gate; `deploy` is
# main-only and only syncs the already-built artifact, so nothing that fails to
# test or compile can reach S3. The `build` job has NO AWS access — it just
# compiles the SPA (VITE_* config baked in from .github/deploy.vars) and uploads
# dist/. Auth is GitHub OIDC — no stored AWS keys.
name: deploy-frontend

on:
  pull_request:
    paths: ["frontend/**", ".github/workflows/deploy-frontend.yml"]
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-frontend.yml"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        working-directory: ${{ github.workspace }}
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .github/deploy.vars >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        working-directory: ${{ github.workspace }}
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .github/deploy.vars >> "$GITHUB_ENV"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: Sync to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist "s3://$SPA_BUCKET" --delete
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
