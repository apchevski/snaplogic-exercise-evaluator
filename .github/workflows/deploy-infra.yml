# Infra: terraform plan on PRs/pushes touching infra/; a gated apply on main.
# Non-secret config (AWS_REGION, AWS_DEPLOY_ROLE_ARN) is loaded from
# .github/deploy.vars — the same single source the deploy-backend/frontend
# workflows use, so there is NO manual "Actions → Variables" step in GitHub.
# Backend bucket/key/region are pinned in infra/.../backend.tf; the `profile`
# set there and in providers.tf is for local runs, so it is overridden to empty
# in CI (-backend-config="profile=" / -var=aws_profile=) and terraform uses the
# OIDC credentials. All terraform variables have committed defaults, so no
# terraform.tfvars is needed.
#
# Two jobs:
#   plan  — always runs; saves the plan (tfplan) as an artifact and prints it to
#           the run summary so it can be reviewed.
#   apply — main only; gated by the `production` GitHub Environment (add a
#           required reviewer there so it pauses for approval), then applies the
#           EXACT reviewed plan. Because it applies a saved plan, terraform will
#           refuse it if remote state drifted after the plan was made — just
#           re-run the workflow if that happens.
name: deploy-infra

on:
  pull_request:
    paths: ["infra/**"]
  push:
    branches: [main]
    paths: ["infra/**", ".github/workflows/deploy-infra.yml"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_DIR: infra/environments/production

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .github/deploy.vars >> "$GITHUB_ENV"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.1"

      # Offline checks (no AWS needed) folded in from the old ci.yml: formatting
      # across all of infra/, plus validate on the bootstrap root the plan below
      # doesn't cover (the production root is validated implicitly by plan).
      - name: Format check
        run: terraform fmt -check -recursive infra

      - name: Validate bootstrap
        run: |
          terraform -chdir=infra/bootstrap init -backend=false -input=false
          terraform -chdir=infra/bootstrap validate

      - name: Init
        run: terraform -chdir=$TF_DIR init -input=false -backend-config="profile="

      - name: Plan
        run: terraform -chdir=$TF_DIR plan -input=false -no-color -out=tfplan -var=aws_profile=

      - name: Plan summary
        run: |
          {
            echo '```terraform'
            terraform -chdir=$TF_DIR show -no-color tfplan
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1
          if-no-files-found: error

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .github/deploy.vars >> "$GITHUB_ENV"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.1"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Init
        run: terraform -chdir=$TF_DIR init -input=false -backend-config="profile="

      - name: Apply
        run: terraform -chdir=$TF_DIR apply -input=false tfplan
